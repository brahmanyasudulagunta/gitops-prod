apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: develop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_USER
          value: krishna
        - name: POSTGRES_PASSWORD
          value: "1729"
        - name: POSTGRES_DB
          value: postgresdb
        ports:
        - containerPort: 5432
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 300m
            memory: 512Mi
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: pgdata
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: develop
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
